<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chỗ của Bi</title>
  <meta name="description" content="Chỗ của Bi — sách, tài liệu, app" />
  <meta name="theme-color" content="#e8688a" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Bi Hub" />
  <!-- Open Graph / chia sẻ -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Chỗ của Bi" />
  <meta property="og:description" content="Kho sách, tài liệu và app học tập / công việc." />
  <meta property="og:url" content="https://linhchibi.io.vn/" />
  <meta property="og:image" content="https://linhchibi.io.vn/icons/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
</head>
<body>
  <!-- Cánh hoa anh đào rơi -->
  <div class="petals" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="app">
    <!-- ===== Sidebar trái (kiểu App Store) ===== -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-logo" id="brandLogo"></span>
        <div class="brand-text">
          <strong id="brandName">Chỗ của Bi</strong>
          <small id="brandTag"></small>
        </div>
      </div>

      <div class="search">
        <svg class="search-icon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input id="searchInput" type="search" placeholder="Tìm sách, website..." autocomplete="off" />
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-cat="all">
          <span class="nav-emoji" id="discoverIcon"></span> Khám phá
        </button>
        <!-- các category sẽ được thêm bằng JS -->
      </nav>

      <div class="sidebar-foot">
        <div class="kitty-frame">
          <img id="kittyImg" src="assets/anh_bi.jpg" alt="Bé Bi" />
        </div>
        <p class="kitty-caption">Bé Bi</p>
        <button id="adminBtn" class="admin-btn" type="button" hidden>
          <span class="lock">🔒</span> <span class="admin-btn-label">Admin</span>
        </button>
      </div>
    </aside>

    <!-- ===== Nội dung chính ===== -->
    <main class="content" id="content">
      <!-- Hero -->
      <header class="hero">
        <div class="hero-text">
          <p class="hero-eyebrow">KHO CỦA LINH CHI</p>
          <h1 id="heroTitle">Bi Hub</h1>
          <p class="hero-sub" id="heroSub">Học và làm việc để mua pate cho Bi</p>
        </div>
        <div class="hero-art" id="heroArt" aria-hidden="true">
          <div class="hero-hill"></div>
        </div>
      </header>

      <!-- Các section nội dung sẽ được render bằng JS -->
      <div id="sections"></div>

      <footer class="footer">
        <span>From Linh to &amp; Chi Bi</span>
      </footer>
    </main>
  </div>

  <!-- Banner khi đang ở chế độ admin -->
  <div id="adminBanner" class="admin-banner" hidden>
    <div class="admin-banner-inner">
      <span class="ab-tag">🌸 Admin</span>
      <span class="ab-msg" id="adminBannerMsg">Đang chỉnh sửa nội dung</span>
      <div class="ab-actions">
        <button type="button" id="adminAddCategory" class="ab-btn">+ Mục lớn</button>
        <button type="button" id="adminSettings" class="ab-btn">⚙ Cài đặt</button>
        <button type="button" id="adminDiscard" class="ab-btn ab-btn-ghost" hidden>Huỷ thay đổi</button>
        <button type="button" id="adminPublish" class="ab-btn ab-btn-primary" disabled>💾 Lưu &amp; Publish</button>
        <button type="button" id="adminLogout" class="ab-btn ab-btn-ghost">Thoát</button>
      </div>
    </div>
  </div>

  <!-- Modal chung -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button type="button" class="modal-x" data-close aria-label="Đóng">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <!-- config.js chứa URL Worker (commit lên GitHub, KHÔNG chứa secret). -->
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
